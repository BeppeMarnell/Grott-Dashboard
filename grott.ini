# grott proxy configuration for the solar_panels_logger project.
# The Growatt ShineLanBox must have its "Server IP" pointed at THIS computer
# (see README). grott listens here, decodes, and forwards on to Growatt's cloud
# so the official ShinePhone app keeps working.

[Generic]
mode = proxy
verbose = True
# Listen address/port for the datalogger to connect to (this PC).
ip = 0.0.0.0
port = 5279

[Growatt]
# Upstream Growatt cloud we forward to (keeps the app working).
ip = server.growatt.com
port = 5279

[MQTT]
nomqtt = True

[extension]
extension = True
extname = grott_sqlite
# SQLite db the dashboard reads. Empty extvar -> the extension falls back to
# ../data/solar.db (relative to extension/). Override with the SOLAR_DB env var,
# or set an absolute path here, e.g. extvar = {"db": "/abs/path/data/solar.db"}.
extvar = {}
