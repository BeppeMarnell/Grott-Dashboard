# grott proxy config used INSIDE the Docker container.
# The db path comes from the SOLAR_DB env var (/data/solar.db on a mounted volume).

[Generic]
mode = proxy
verbose = True
ip = 0.0.0.0
port = 5279

[Growatt]
ip = server.growatt.com
port = 5279

[MQTT]
nomqtt = True

[extension]
extension = True
extname = grott_sqlite
extvar = {}
