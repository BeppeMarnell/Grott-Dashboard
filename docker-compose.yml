# Three services sharing the ./data volume (the SQLite db).
#   grott-init : one-shot bootstrap — clones grott + applies the local-ACK patch
#                into the shared grott_src volume (runs only until grott/ exists).
#   grott      : proxy/collector on :5279  (point the logger here)
#   web        : dashboard on http://localhost:8088
#
#   docker compose up -d --build   # self-bootstraps grott on first run
#   docker compose logs -f
#
# To force a fresh grott fetch (e.g. after bumping GROTT_COMMIT):
#   docker compose down && docker volume rm solar_panels_logger_grott_src

services:
  # One-shot: populate the grott_src volume with a patched grott. Idempotent —
  # skips cloning/patching if the volume already has a patched copy, then exits.
  grott-init:
    image: alpine/git:latest
    environment:
      GROTT_REPO: https://github.com/johanmeijer/grott.git
      GROTT_COMMIT: fb52e2d4ff3065f60db45a7c2c82f2ad7e9f8463
    volumes:
      - grott_src:/src/grott
      - ./patches:/patches:ro
    entrypoint: ["/bin/sh", "-c"]
    # $$ escapes compose interpolation so the shell in the container expands the
    # env vars above (a single $ would be substituted by compose at parse time).
    command:
      - |
        set -e
        # Sentinel flag: once bootstrapped, exit immediately on every later `up`
        # (no git work, no re-clone, no re-patch). Delete the volume to redo it.
        if [ -f /src/grott/.solar-init-done ]; then
          echo "grott-init: already initialized — nothing to do."
          exit 0
        fi
        if [ ! -f /src/grott/grottproxy.py ]; then
          echo "grott-init: cloning grott $$GROTT_COMMIT ..."
          git clone "$$GROTT_REPO" /src/grott
          git -C /src/grott checkout --quiet "$$GROTT_COMMIT"
        fi
        if ! grep -q "solar_panels_logger patch" /src/grott/grottproxy.py; then
          echo "grott-init: applying local-ACK patch ..."
          git -C /src/grott apply /patches/grottproxy-solar-local-ack.patch
        fi
        touch /src/grott/.solar-init-done
        echo "grott-init: grott ready."
    restart: "no"

  grott:
    build:
      context: .
      dockerfile: Dockerfile.grott
    image: solar-grott
    command: python grott/grott.py -c /app/grott.docker.ini
    depends_on:
      grott-init:
        condition: service_completed_successfully
    # Load all settings from .env (optional — defaults below cover a fresh clone),
    # then override the container-specific paths that must differ from the host.
    env_file:
      - path: .env
        required: false
    environment:
      # In-container mount path — overrides the relative SOLAR_DB from .env.
      SOLAR_DB: /data/solar.db
      SOLAR_TZ: ${SOLAR_TZ:-Europe/Rome}
      PYTHONUNBUFFERED: "1"
    ports:
      - "5279:5279"
    volumes:
      - ./data:/data
      - ./grott.docker.ini:/app/grott.docker.ini:ro
      - grott_src:/app/grott
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: solar-web
    command: python web/app.py
    # Load all settings from .env (optional — defaults below cover a fresh clone),
    # then override the container-specific values that must differ from the host.
    env_file:
      - path: .env
        required: false
    environment:
      # In-container mount path — overrides the relative SOLAR_DB from .env.
      SOLAR_DB: /data/solar.db
      # Bind all interfaces inside the container so the port mapping is reachable
      # — overrides SOLAR_WEB_HOST=127.0.0.1 from .env.
      SOLAR_WEB_HOST: 0.0.0.0
      SOLAR_TZ: ${SOLAR_TZ:-Europe/Rome}
      SOLAR_WEB_PORT: ${SOLAR_WEB_PORT:-8088}
      SOLAR_PRICE: ${SOLAR_PRICE:-0.124}
      SOLAR_REFRESH: ${SOLAR_REFRESH:-60}
    ports:
      - "${SOLAR_WEB_PORT:-8088}:${SOLAR_WEB_PORT:-8088}"
    volumes:
      - ./data:/data
    depends_on:
      - grott
    restart: unless-stopped

volumes:
  grott_src:
