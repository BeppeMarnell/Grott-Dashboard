# Settings for the web dashboard.

[economics]
# Feed-in tariff in EUR per kWh — what you're paid for energy sent to the grid.
# The dashboard multiplies your solar production by this to value it.
# (Docker overrides this via SOLAR_PRICE in docker-compose.yml.)
price_eur_per_kwh = 0.124
currency_symbol = €

[paths]
# SQLite database written by the grott extension. Keep in sync with grott.ini.
# Relative to the project root; override with the SOLAR_DB env var if needed.
db = data/solar.db

[web]
host = 127.0.0.1
port = 8088
# Dashboard auto-refresh interval in seconds.
refresh_seconds = 60
